{% extends 'base.html' %}
{% load static %}

{% block title %}Đăng ký tài khoản - Bản đồ DTHU{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 bg-dark-gradient py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card glass-card shadow-lg border-0 text-white rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold mb-1">Tạo tài khoản</h2>
                            <p class="text-white-50">Đăng ký thành viên để lưu lịch sử và đánh giá</p>
                        </div>
                        
                        <form method="POST" action="{% url 'client:register' %}">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="first_name" class="form-label text-white-50 small">Họ & Tên đệm</label>
                                    <input type="text" class="form-control" id="first_name" name="first_name" placeholder="Ví dụ: Nguyễn Văn" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="last_name" class="form-label text-white-50 small">Tên</label>
                                    <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Ví dụ: Cường" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="username" class="form-label text-white-50 small">Tên đăng nhập</label>
                                <div class="input-group glass-input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-user text-white-50"></i></span>
                                    <input type="text" class="form-control" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label text-white-50 small">Email</label>
                                <div class="input-group glass-input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-envelope text-white-50"></i></span>
                                    <input type="email" class="form-control" id="email" name="email" placeholder="example@gmail.com" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="phone" class="form-label text-white-50 small">Số điện thoại</label>
                                <div class="input-group glass-input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-phone text-white-50"></i></span>
                                    <input type="text" class="form-control" id="phone" name="phone" placeholder="Nhập số điện thoại">
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label text-white-50 small">Mật khẩu</label>
                                <div class="input-group glass-input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-lock text-white-50"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="Nhập mật khẩu ít nhất 6 ký tự" required minlength="6">
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-semibold shadow mb-3 btn-hover-effect">
                                Đăng ký
                            </button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <span class="text-white-50 small">Đã có tài khoản? </span>
                            <a href="{% url 'client:login' %}" class="text-primary fw-semibold text-decoration-none small">Đăng nhập</a>
                        </div>
                        <div class="text-center mt-3">
                            <a href="{% url 'client:giao_dien_chinh' %}" class="text-white-50 text-decoration-none small"><i class="fa-solid fa-arrow-left me-1"></i> Quay về Bản đồ</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
